<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .hero {
            background-color: #4A90E2;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .cta-btn {
            background-color: white;
            color: #4A90E2;
            padding: 12px 25px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
        }

        .cta-btn:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Welcome to Our Website</h1>
        <p>Your journey to success starts here.</p>
        <a href="#" class="cta-btn">Get Started</a>
    </section>

</body>
</html>
